<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieDB - Trang Xem Phim</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">MovieDB</h1>
                <div class="search-box">
                    <!-- Added dropdown to choose search field -->
                    <select id="searchFieldSelect" aria-label="Chọn trường tìm kiếm">
                        <option value="movie_name" selected>Tên phim</option>
                        <option value="genre">Thể loại</option>
                        <option value="director">Đạo diễn</option>
                        <option value="star">Diễn viên</option>
                        <option value="all">Tất cả</option>
                    </select>

                    <input type="text" id="searchInput" placeholder="Tìm kiếm phim, đạo diễn, thể loại...">
                    <button id="searchBtn">Tìm kiếm</button>
                </div>
                <div class="auth-area">
                    <div id="guestActions" class="guest-actions">
                        <button id="openLoginBtn" class="auth-btn secondary">Đăng nhập</button>
                        <button id="openRegisterBtn" class="auth-btn primary">Đăng ký</button>
                    </div>
                    <div id="userActions" class="user-actions" style="display: none;">
                        <button id="profileBtn" class="profile-btn">
                            <span id="userInitial" class="user-initial">U</span>
                            <span id="userNameLabel">Tài khoản</span>
                        </button>
                        <button id="logoutBtn" class="auth-btn secondary">Đăng xuất</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="authModal" class="auth-modal" aria-hidden="true" style="display: none;">
        <div class="auth-modal-backdrop" data-close-auth></div>
        <div class="auth-panel" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
            <button id="closeAuthModalBtn" class="modal-close" aria-label="Đóng">×</button>
            <div class="auth-tabs">
                <button id="loginTabBtn" class="auth-tab active" data-auth-mode="login">Đăng nhập</button>
                <button id="registerTabBtn" class="auth-tab" data-auth-mode="register">Đăng ký</button>
                <button id="profileTabBtn" class="auth-tab" data-auth-mode="profile" style="display: none;">Hồ sơ</button>
            </div>
            <h2 id="authModalTitle" class="auth-title">Đăng nhập</h2>
            <form id="loginForm" class="auth-form">
                <label>
                    Email hoặc username
                    <input id="loginIdentifier" type="text" autocomplete="username" required>
                </label>
                <label>
                    Mật khẩu
                    <input id="loginPassword" type="password" autocomplete="current-password" required>
                </label>
                <button type="submit" class="auth-submit">Đăng nhập</button>
            </form>
            <form id="registerForm" class="auth-form" style="display: none;">
                <label>
                    Username
                    <input id="registerUsername" type="text" autocomplete="username" minlength="3" required>
                </label>
                <label>
                    Email
                    <input id="registerEmail" type="email" autocomplete="email" required>
                </label>
                <label>
                    Họ tên
                    <input id="registerFullName" type="text" autocomplete="name">
                </label>
                <label>
                    Mật khẩu
                    <input id="registerPassword" type="password" autocomplete="new-password" minlength="6" required>
                </label>
                <button type="submit" class="auth-submit">Tạo tài khoản</button>
            </form>
            <form id="profileForm" class="auth-form" style="display: none;">
                <label>
                    Username
                    <input id="profileUsername" type="text" autocomplete="username" minlength="3" required>
                </label>
                <label>
                    Email
                    <input id="profileEmail" type="email" autocomplete="email" required>
                </label>
                <label>
                    Họ tên
                    <input id="profileFullName" type="text" autocomplete="name">
                </label>
                <button type="submit" class="auth-submit">Lưu thay đổi</button>
            </form>
            <p id="authMessage" class="auth-message" aria-live="polite"></p>
        </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="tabs-container">
        <div class="container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="movies">Danh sách phim</button>
                <button class="tab-btn" data-tab="visualization">Data Visualization</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Movie List View -->
            <div id="movieListView" class="movie-list-view tab-content active">
                <div id="similarMoviesHomeSection" class="similar-home-section">
                    <h2 class="section-title">Phim tương tự</h2>
                    <p id="similarHomeSource" class="similar-source"></p>
                    <div id="similarMoviesHomeContainer" class="recommend-grid">
                        <!-- Similar movies loaded here -->
                    </div>
                </div>

                <h2 class="section-title">Danh sách phim</h2>
                <div id="moviesContainer" class="movies-grid">
                    <!-- Movies will be loaded here -->
                </div>
                <div class="pagination">
                    <button id="prevBtn" class="pagination-btn">Trước</button>
                    <span id="pageInfo" class="page-info">Trang 1</span>
                    <button id="nextBtn" class="pagination-btn">Sau</button>
                </div>
            </div>

            <!-- Movie Detail View -->
            <div id="movieDetailView" class="movie-detail-view" style="display: none;">
                <button id="backBtn" class="back-btn">← Quay lại</button>
                <div id="movieDetail" class="movie-detail">
                    <!-- Movie details will be loaded here -->
                </div>
                <div id="similarMoviesSection" class="detail-section similar-detail-section" style="display: none;">
                    <h2 class="detail-section-title">Phim tương tự</h2>
                    <div id="similarMoviesContainer" class="recommend-grid">
                        <!-- Similar movies loaded here -->
                    </div>
                </div>
            </div>

            <!-- Data Visualization View -->
            <div id="visualizationView" class="visualization-view tab-content" style="display: none;">
                <h2 class="section-title">Data Visualization</h2>
                
                <div class="visualization-grid">
                    <!-- Rating Distribution -->
                    <div class="viz-card">
                        <h3 class="viz-title">Rating Distribution</h3>
                        <canvas id="ratingChart"></canvas>
                    </div>

                    <!-- Top Movies -->
                    <div class="viz-card">
                        <h3 class="viz-title">Top Movies</h3>
                        <canvas id="topMoviesChart"></canvas>
                    </div>

                    <!-- Top Genres -->
                    <div class="viz-card">
                        <h3 class="viz-title">Top Genres</h3>
                        <canvas id="topGenresChart"></canvas>
                    </div>

                    <!-- Heatmap -->
                    <div class="viz-card">
                        <h3 class="viz-title">Average Rating by Year (Heatmap)</h3>
                        <canvas id="heatmapChart"></canvas>
                    </div>

                    <!-- Bar Chart -->
                    <div class="viz-card">
                        <h3 class="viz-title">Movies per Year (Bar Chart)</h3>
                        <canvas id="barChart"></canvas>
                    </div>

                    <!-- Histogram -->
                    <div class="viz-card">
                        <h3 class="viz-title">Runtime Distribution (Histogram)</h3>
                        <canvas id="histogramChart"></canvas>
                    </div>

                    <!-- Word Cloud -->
                    <div class="viz-card full-width">
                        <h3 class="viz-title">Word Cloud</h3>
                        <div id="wordcloudContainer" style="width: 100%; height: 400px; position: relative;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner" style="display: none;">
        <div class="spinner"></div>
    </div>

    <script>
        window.API_GATEWAY_URL = {{ api_gateway_url | tojson }};
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
